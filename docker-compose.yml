services:
  postgres:
    image: postgres:16-alpine
    container_name: mathforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mathforge
      POSTGRES_USER: mathforge
      POSTGRES_PASSWORD: mathforge
    ports:
      - "5432:5432"
    volumes:
      - mathforge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathforge -d mathforge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mathforge-postgres-data:
