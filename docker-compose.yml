services:
  postgres:
    image: postgres:16-alpine
    container_name: learningforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: learningforge
      POSTGRES_USER: learningforge
      POSTGRES_PASSWORD: learningforge
    ports:
      - "55433:5432"
    volumes:
      - learningforge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learningforge -d learningforge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  learningforge-postgres-data:
